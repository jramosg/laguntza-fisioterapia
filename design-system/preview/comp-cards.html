<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head><body>
<style>
 .c{flex:1;border-radius:18px;padding:18px;background:var(--surface-1)}
 .c h4{margin:0 0 6px;font-size:16px;font-weight:600;color:var(--fg-1)}
 .c p{margin:0;font-size:13px;color:var(--fg-2)}
 .c-elev{box-shadow:var(--shadow-md);background:#fff}
 .c-out{background:#fff;border:1px solid var(--outline);box-shadow:none}
 .c-flat{background:var(--surface-1)}
</style>
<div class="row" style="gap:14px;align-items:stretch">
 <div class="c c-elev"><h4>Elevated</h4><p>shadow-md, lifts on hover</p></div>
 <div class="c c-out"><h4>Outlined</h4><p>1px outline, fills on hover</p></div>
 <div class="c c-flat"><h4>Flat</h4><p>surface-1, no shadow</p></div>
</div></body></html>
