<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head><body style="padding:0">
<div style="display:flex;height:200px;font-family:var(--font-sans)">
 <div style="flex:1;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;border-right:1px solid var(--outline)">
   <img src="../assets/logos/isotipo-color.svg" style="height:104px">
   <span style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3)">Full colour · on light</span>
 </div>
 <div style="flex:1;background:var(--surface-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px">
   <img src="../assets/logos/isotipo-white.svg" style="height:104px">
   <span style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.45)">Reversed · on dark</span>
 </div>
 <div style="flex:1;background:var(--primary);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px">
   <img src="../assets/logos/isotipo-white.svg" style="height:104px">
   <span style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.6)">Reversed · on brand</span>
 </div>
</div></body></html>
