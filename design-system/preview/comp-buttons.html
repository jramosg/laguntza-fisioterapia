<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head><body>
<style>
 .btn{font-family:var(--font-sans);font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--button-radius);padding:0.6rem 1.4rem;font-size:15px}
 .btn-primary{background:var(--primary-700);color:#fff}
 .btn-outlined{background:transparent;color:var(--primary);border:2px solid var(--primary)}
 .btn-cta{background:var(--secondary);color:#1a1205;box-shadow:0 4px 12px rgba(232,148,74,.3);padding:0.7rem 1.6rem}
 .btn-grad{background:var(--gradient-primary);color:#fff;padding:0.7rem 1.7rem}
</style>
<div class="row" style="gap:14px">
 <button class="btn btn-primary">Pedir cita</button>
 <button class="btn btn-outlined">Servicios</button>
 <button class="btn btn-cta">Hitzordua hartu</button>
 <button class="btn btn-grad">Enviar &rsaquo;</button>
</div></body></html>
