<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Laguntza Fisioterapia — UI Kit</title>
<link rel="stylesheet" href="app.css" />
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#458295"/><path d="M20 58c8-3 14-12 22-10s10 8 18 6" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round"/></svg></template>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="content.jsx"></script>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Pages.jsx"></script>

<script type="text/babel">
function App() {
  const [lang, setLang] = React.useState('es');
  const [view, setView] = React.useState('home');
  const go = (v) => { setView(v); window.scrollTo({ top: 0, behavior: 'auto' }); };
  const onDark = view === 'home';
  return (
    <div className="app-frame">
      <Header lang={lang} setLang={setLang} view={view} go={go} onDark={onDark} />
      {view === 'home' && (<><Hero lang={lang} go={go} /><HomeContent lang={lang} go={go} /></>)}
      {view === 'services' && <ServicesPage lang={lang} go={go} />}
      {view === 'contact' && <ContactPage lang={lang} />}
      <Footer lang={lang} go={go} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
