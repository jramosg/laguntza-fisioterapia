services:
  api:
    build: .
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"

  postgres:
    image: postgres:18-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: laguntza_booking
      POSTGRES_USER: booking_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_app -d laguntza_booking"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:
